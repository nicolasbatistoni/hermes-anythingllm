# ⚠ ARCHIVO GENERADO por `cicd render-pipeline` — NO EDITAR A MANO.
#
# Fuente de verdad: `cicd.yml` (`.paths`/`.packages` = disparo, `.images` = imagen por step) + la
# plantilla del motor (nicolasbatistoni/cicd-toolkit). Para cambiar el pipeline, cambiá uno de esos dos y
# corré `cicd render-pipeline`.
#
# El step `security` corre `cicd render-pipeline --check`: si este archivo quedó desincronizado de su
# fuente (porque alguien lo editó a mano), **el CI falla**. Un generado que nadie vigila se pudre igual
# que un copiado.

variables:
  - &toolkit ghcr.io/nicolasbatistoni/cicd-toolkit:latest

  # Allowlist de disparo (AGENTS §1.ter). Fuente: `.paths` del cicd.yml — acá es DERIVADA.
  # INVARIANTE: un pipeline corre si y solo si el commit tocó código del paquete, código de una
  # dependencia que ese paquete consume, o su propia definición de pipeline.
  - &code_paths
    include:
      - 'mcp/**'
      - 'scripts/**'
      - 'config/**'
      - 'install.sh'
      - 'install.ps1'
      - 'cicd.yml'
      - '.woodpecker.yml'
      - 'AGENTS.md'

when:
  # `push` dispara en CADA push a CUALQUIER rama. Sin restringirlo a main, cada commit de una rama
  # corría el pipeline DOS VECES: una por el push de la rama y otra por el pull_request, sobre el MISMO
  # SHA. `pull_request` se re-dispara en cada commit nuevo del PR, así que el PR ya cubre todo.
  - event: pull_request
  - event: push
    branch: main

steps:
  security:                 # SIN when:path → corre SIEMPRE. Única excepción, deliberada: Trivy caza un
    image: *toolkit         # secreto commiteado hasta en un README, y los guards tienen que correr
    commands:               # aunque el commit no toque código.
      - cicd security
      - cicd paths-guard              # la allowlist cubre TODO el código versionado (si no, fail-closed silencioso)
      - cicd render-pipeline --check  # este archivo sigue en sync con su fuente (un generado sin gate se pudre)

  release:
    image: *toolkit
    # `cicd release` a secas: el MOTOR ya autentica (`vcs_setup_auth` → gh auth setup-git) y trae el
    # historial y los tags (`vcs_ensure_history` → unshallow + fetch --tags). Antes eso vivía acá, en cada
    # adaptador — y 19 de 27 NO lo tenían: el motor no veía los tags, creía que era el primer release y
    # calculaba la versión desde 0.0.0, publicando una versión PARA ATRÁS (le pasó a ai-asset-pipeline).
    # El motor NECESITA credenciales e historial para hacer su trabajo: no puede depender de que 27 YAMLs
    # se acuerden de dárselos.
    commands: [cicd release]
    when:
      - event: push
        branch: main
        path: *code_paths
    environment:
      GH_TOKEN: { from_secret: gh_token }
